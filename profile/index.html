<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>히라 · 프로필</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Jua&family=Noto+Sans+JP:wght@500;900&family=Gothic+A1:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/css/common.css" />
<style>
  .hero{text-align:center;padding:8px 0 22px;}
  .hname{font-family:'Jua',sans-serif;color:var(--red);font-size:4.6rem;line-height:.9;
    text-shadow:2px 0 0 #fff,-2px 0 0 #fff,0 2px 0 #fff,0 -2px 0 #fff,5px 6px 0 rgba(208,109,34,.35);}
  .hread{font-family:'Anton',sans-serif;letter-spacing:.14em;color:var(--red-d);font-size:1.05rem;opacity:.8;margin-top:10px;}
  .hbio{font-weight:700;color:#5b463a;margin:14px auto 18px;max-width:30ch;line-height:1.6;}
  .hbtn{display:inline-flex;align-items:center;gap:8px;text-decoration:none;font-family:'Jua',sans-serif;
    color:#fff;background:var(--hot);padding:11px 22px;border-radius:40px;border:4px solid #fff;box-shadow:0 5px 0 #d63b7d;}
  .hbtn:active{transform:translateY(2px);box-shadow:0 2px 0 #d63b7d;}
  .ilist{list-style:none;display:grid;gap:10px;}
  .ilist li{font-size:.98rem;display:flex;gap:12px;}
  .ilist b{font-family:'Jua',sans-serif;font-weight:400;color:var(--red);min-width:84px;font-size:.85rem;}
  .ilist .empty{color:#c2a890;font-weight:400;}
  .links{display:flex;gap:10px;flex-wrap:wrap;}
  .lbtn{text-decoration:none;font-family:'Jua',sans-serif;font-size:.88rem;color:#fff;background:var(--red);
    border:3px solid #fff;border-radius:14px;padding:8px 15px;box-shadow:0 3px 0 var(--red-d);}
  .lbtn.alt{background:#fff;color:var(--red-d);box-shadow:0 3px 0 rgba(208,109,34,.25);}
  @media (max-width:560px){ .hname{font-size:3.4rem;} }
</style>
</head>
<body>

<nav class="topnav">
  <a class="home" href="/">히라 ♡</a>
  <a class="lk on" href="/profile/">프로필</a>
  <a class="lk" href="/schedule/">일정</a>
  <a class="lk" href="https://meloming.com/channel/hira" target="_blank" rel="noopener">노래책</a>
  <a class="lk" href="/upbo/">업보</a>
  <a class="lk" href="/guide/">방송안내</a>
</nav>

<div class="page">
  <div class="phead"><span class="kr">프로필</span><span class="en">PROFILE</span></div>
  <div id="pubview"></div>
</div>

<footer class="foot">
  <div class="h">© 2026 히라 · 꾸이단 💗</div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/supabase-config.js"></script>
<script>
// site_settings 없거나 로드 실패 시 폴백 기본값
const DEFAULTS={
  name:'히라', reading:'ヒラ · HIRA',
  bio:'기미라다. 8시에 온다. 쓰껄하러 와라.',
  birthday:'2002. 08. 23', debut:'2024. 03. 17', mbti:'einTfp',
  gender:'여', personality:'밝음 · 변태', agency:'', fandom:'꾸이 · 꾸이단',
  schedule:'저녁 8시 고정 (수 · 토 휴방)', content:'소통 · 종겜 · 노래',
  games:'스팀 종겜 · 그 외 메이저 게임', music:'K-POP · J-POP · 인디 · 감성힙합',
  likes:'', dislikes:'',
  channel:'https://www.sooplive.com/station/sjsr4611',
  youtube:'https://www.youtube.com/@%EC%9A%B0%EC%A3%BC%EC%B1%84%EA%B0%95%ED%9E%88%EB%9D%BC',
  cafe:'https://cafe.naver.com/hirarara',
  songclip:'https://vod.sooplive.com/player/189985747'
};
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function row(label,val,settable){
  const empty=!val||!String(val).trim();
  const v=empty?'<span class="empty">아직 미설정</span>':esc(val);
  return `<li><b>${label}</b><span>${v}</span></li>`;
}
function renderPublic(S){
  document.getElementById('pubview').innerHTML=`
  <div class="hero">
    <div class="hname">${esc(S.name)}</div>
    <div class="hread">${esc(S.reading)}</div>
    <div class="hbio">${esc(S.bio)}</div>
    ${S.channel?`<a class="hbtn" href="${esc(S.channel)}" target="_blank" rel="noopener">🎬 방송국 바로가기</a>`:''}
  </div>
  <section class="panel"><h2>📇 기본 정보</h2><ul class="ilist">
    ${row('생일',S.birthday)}${row('데뷔일',S.debut)}${row('MBTI',S.mbti)}${row('성별',S.gender)}
    ${row('성격',S.personality)}${row('소속',S.agency)}${row('팬덤',S.fandom)}
  </ul></section>
  <section class="panel"><h2>📺 방송</h2><ul class="ilist">
    ${row('방송 시간',S.schedule)}${row('콘텐츠',S.content)}${row('게임',S.games)}
  </ul></section>
  <section class="panel"><h2>🎵 음악</h2><ul class="ilist">${row('장르',S.music)}</ul>
    ${S.songclip?`<div class="links" style="margin-top:12px"><a class="lbtn" href="${esc(S.songclip)}" target="_blank" rel="noopener">🎧 노래 클립 보기</a></div>`:''}
  </section>
  <section class="panel"><h2>💗 좋아하는 것 · 싫어하는 것</h2><ul class="ilist">
    ${row('좋아하는 것',S.likes)}${row('싫어하는 것',S.dislikes)}
  </ul></section>
  <section class="panel"><h2>🔗 SNS</h2><div class="links">
    ${S.youtube?`<a class="lbtn" href="${esc(S.youtube)}" target="_blank" rel="noopener">유튜브</a>`:''}
    ${S.cafe?`<a class="lbtn alt" href="${esc(S.cafe)}" target="_blank" rel="noopener">카페</a>`:''}
  </div></section>`;
}
async function load(){
  let S=Object.assign({},DEFAULTS);
  try{
    const sb=initSupabase();
    if(sb){
      const {data,error}=await sb.from('site_settings').select('key,value');
      if(!error && data){ data.forEach(r=>{ if(r.value!=null) S[r.key]=r.value; }); }
    }
  }catch(e){ /* 폴백 유지 */ }
  renderPublic(S);
}
renderPublic(DEFAULTS); // 즉시 기본값으로 1차 렌더(깜빡임 방지)
load();                 // Supabase 값으로 갱신
</script>
</body>
</html>
