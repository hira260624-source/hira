<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1000" />
<title>히라 · 업보</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/css/common.css" />
<style>
  .search{width:100%;max-width:280px;padding:9px 14px;border:2.5px solid var(--pink);border-radius:14px;
    font-family:'A2z';font-size:.9rem;color:var(--ink);background:var(--cream);margin-bottom:14px;}
  .search:focus{outline:none;border-color:var(--red);}
  .season-tabs{display:flex;flex-wrap:wrap;gap:9px;margin-bottom:16px;}
  .season-tabs button{padding:8px 20px;border-radius:13px;font-family:'A2z',sans-serif;font-size:.96rem;font-weight:800;
    cursor:pointer;border:2px solid var(--pink);color:var(--red-d);background:#fff;box-shadow:0 3px 0 rgba(208,109,34,.15);transition:transform .1s;}
  .season-tabs button.on{color:#fff;background:var(--red);border-color:var(--red);box-shadow:0 3px 0 var(--red-d);}
  .season-tabs button:active{transform:translateY(2px);}
  .scroll{overflow:visible;border-radius:12px;}
  table{border-collapse:collapse;width:100%;font-size:.92rem;}
  th,td{padding:9px 11px;border-bottom:1px solid var(--pink-l);white-space:nowrap;}
  thead th{font-family:'A2z',sans-serif;font-weight:800;font-weight:400;color:var(--red-d);
    border-bottom:2px solid var(--pink);cursor:pointer;user-select:none;font-size:.85rem;}
  th.sortable::after{content:' ↕';opacity:.35;font-size:.7rem;}
  th.asc::after{content:' ↑';opacity:.9;} th.desc::after{content:' ↓';opacity:.9;}
  td.vn,th.vn{text-align:left;font-weight:700;color:#5b463a;}
  td.cnt{text-align:center;}
  .pill{display:inline-block;min-width:26px;padding:2px 8px;border-radius:11px;font-weight:700;font-size:.82rem;}
  .pill.z{background:transparent;color:#d8c8ba;font-weight:400;}
  tbody tr:hover td{background:var(--cream);}
  tfoot td{border-top:2px solid var(--pink);border-bottom:none;font-weight:700;color:var(--red-d);background:#fffdf9;}
  .sw{width:11px;height:11px;border-radius:3px;display:inline-block;margin-right:4px;vertical-align:middle;}
  .ipbar{position:sticky;top:62px;z-index:30;display:flex;align-items:center;justify-content:center;gap:12px;
    background:#fff;border:2px solid var(--pink);border-radius:12px;padding:7px 12px;margin-bottom:10px;box-shadow:0 3px 10px rgba(208,109,34,.1);}
  .ipbar button{font-family:'A2z';font-weight:800;font-size:.95rem;color:#fff;background:var(--red);border:2px solid #fff;
    border-radius:9px;padding:5px 15px;cursor:pointer;box-shadow:0 2px 0 var(--red-d);}
  .ipbar button:disabled{opacity:.38;cursor:default;box-shadow:none;}
  .ipbar .ipinfo{font-family:'A2z';font-weight:800;color:var(--red-d);font-size:.95rem;min-width:120px;text-align:center;}
  thead th{position:sticky;top:104px;background:#fff;z-index:20;box-shadow:inset 0 -2px 0 var(--pink);}
  thead th.vn{z-index:21;}
  th.ith{white-space:normal;line-height:1.18;min-width:54px;}
  .hint{font-size:.78rem;color:#b08b6e;margin-top:10px;}
</style>
</head>
<body>
<div id="page-loader"><img class="pl-img" src="/loader.png" alt="히라"><div class="pl-dots"><span></span><span></span><span></span></div></div>

<nav class="topnav"><div class="nav-inner">
  <a class="home" href="/">히라 ♡</a>
  <a class="lk" href="/profile/">프로필</a>
  <a class="lk" href="/schedule/">일정</a>
  <a class="lk" href="https://meloming.com/channel/hira" target="_blank" rel="noopener">노래책</a>
  <a class="lk on" href="/upbo/">업보</a>
  <a class="lk" href="/guide/">방송안내</a>
</div></nav>

<div class="page">
  <div class="phead"><span class="kr">업보</span><span class="en">HOMEWORK</span></div>
  <div class="season-tabs" id="seasonTabs"></div>
  <input class="search" id="q" type="text" placeholder="🔎 시청자 검색…" />
  <section class="panel">
    <div class="ipbar" id="itemBar"></div>
    <div class="scroll"><table id="tbl"></table></div>
    <p class="hint">헤더 클릭 = 정렬 · 합계 기준 정렬 기본 · 항목이 많으면 위 «이전/다음»으로 넘겨보세요.</p>
  </section>
</div>

<footer class="foot">
  <div class="h">© 2026 히라 · 꾸이단 💗</div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/supabase-config.js"></script>
<script>
let DATA={types:[],viewers:[],seasons:[]};
let curSeason=null;
let itemPage=0; const PAGE_SIZE=6;
let sortKey='__total', sortDir='desc';
function curViewers(){ if(!DATA.seasons.length || !curSeason) return DATA.viewers; return DATA.viewers.filter(v=>String(v.season_id)===String(curSeason)); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function hexA(hex,a){ if(!hex) return 'transparent'; const m=hex.replace('#',''); const r=parseInt(m.slice(0,2),16),g=parseInt(m.slice(2,4),16),b=parseInt(m.slice(4,6),16); return `rgba(${r},${g},${b},${a})`; }
function getCount(v,t){ const n=v.counts?v.counts[String(t.id)]:0; return n?Number(n):0; }
function rowTotal(v){ return DATA.types.reduce((s,t)=>s+getCount(v,t),0); }
function colTotal(t){ return curViewers().reduce((s,v)=>s+getCount(v,t),0); }
function grand(){ return curViewers().reduce((s,v)=>s+rowTotal(v),0); }

function pageTypes(){ const st=itemPage*PAGE_SIZE; return DATA.types.slice(st, st+PAGE_SIZE); }
function nPages(){ return Math.max(1, Math.ceil(DATA.types.length/PAGE_SIZE)); }
function renderItemBar(){
  const bar=document.getElementById('itemBar'); if(!bar) return;
  if(DATA.types.length<=PAGE_SIZE){ bar.style.display='none'; return; }
  bar.style.display='flex';
  const s=itemPage*PAGE_SIZE+1, e=Math.min((itemPage+1)*PAGE_SIZE, DATA.types.length);
  bar.innerHTML=`<button ${itemPage===0?'disabled':''} data-ip="prev">‹ 이전</button>`
    +`<span class="ipinfo">항목 ${s}\u2013${e} / ${DATA.types.length}</span>`
    +`<button ${itemPage>=nPages()-1?'disabled':''} data-ip="next">다음 ›</button>`;
}
function render(){
  if(itemPage>=nPages()) itemPage=nPages()-1; if(itemPage<0) itemPage=0;
  renderItemBar();
  const T=pageTypes();
  if(!DATA.types.length || !curViewers().length){
    document.getElementById('tbl').innerHTML=`<tbody><tr><td style="text-align:center;color:#b08b6e;padding:30px">아직 등록된 업보가 없어요 🍑</td></tr></tbody>`;
    return;
  }
  const q=(document.getElementById('q').value||'').trim().toLowerCase();
  let V=curViewers().filter(v=>!q || (v.name||'').toLowerCase().includes(q));
  V=V.slice().sort((a,b)=>{
    if(sortKey==='__name'){ return sortDir==='asc'?(a.name||'').localeCompare(b.name||''):(b.name||'').localeCompare(a.name||''); }
    let av,bv;
    if(sortKey==='__total'){ av=rowTotal(a); bv=rowTotal(b); }
    else { const t={id:sortKey}; av=getCount(a,t); bv=getCount(b,t); }
    return sortDir==='asc'?av-bv:bv-av;
  });
  const cls=k=>'sortable'+(sortKey===k?(' '+sortDir):'');
  let h=`<thead><tr><th class="vn ${cls('__name')}" data-sort="__name">시청자</th>`;
  T.forEach(t=>{ h+=`<th class="ith ${cls(t.id)}" data-sort="${t.id}"><span class="sw" style="background:${t.color||'#ffb3d1'}"></span>${esc(t.name)}</th>`; });
  h+=`<th class="${cls('__total')}" data-sort="__total">합계</th></tr></thead><tbody>`;
  if(!V.length){ h+=`<tr><td colspan="${T.length+2}" style="text-align:center;color:#b08b6e;padding:22px">검색 결과 없음</td></tr>`; }
  V.forEach(v=>{
    h+=`<tr><td class="vn">${esc(v.name)}</td>`;
    T.forEach(t=>{ const n=getCount(v,t); h+=`<td class="cnt">`+(n?`<span class="pill" style="background:${hexA(t.color||'#ffb3d1',.5)}">${n}</span>`:`<span class="pill z">0</span>`)+`</td>`; });
    h+=`<td class="cnt"><b style="color:var(--red)">${rowTotal(v)}</b></td></tr>`;
  });
  h+=`</tbody><tfoot><tr><td class="vn">합계</td>`;
  T.forEach(t=>{ h+=`<td class="cnt">${colTotal(t)}</td>`; });
  h+=`<td class="cnt">${grand()}</td></tr></tfoot>`;
  document.getElementById('tbl').innerHTML=h;
}
document.getElementById('tbl').addEventListener('click',e=>{
  const th=e.target.closest('th[data-sort]'); if(!th) return;
  const k=th.dataset.sort;
  if(sortKey===k){ sortDir=sortDir==='asc'?'desc':'asc'; }
  else { sortKey=k; sortDir=(k==='__name')?'asc':'desc'; }
  render();
});
document.getElementById('q').addEventListener('input',render);

function renderSeasonTabs(){
  const wrap=document.getElementById('seasonTabs'); if(!wrap) return;
  if(DATA.seasons.length<=1){ wrap.style.display='none'; wrap.innerHTML=''; return; }
  wrap.style.display='flex';
  wrap.innerHTML=DATA.seasons.map(s=>`<button class="${String(s.id)===String(curSeason)?'on':''}" data-sid="${s.id}">${esc(s.name)}</button>`).join('');
}
document.getElementById('seasonTabs').addEventListener('click',e=>{
  const b=e.target.closest('button[data-sid]'); if(!b) return;
  curSeason=b.dataset.sid;
  document.querySelectorAll('#seasonTabs button').forEach(x=>x.classList.toggle('on', x.dataset.sid===curSeason));
  render();
});
document.getElementById('itemBar').addEventListener('click',e=>{
  const b=e.target.closest('button[data-ip]'); if(!b) return;
  if(b.dataset.ip==='prev' && itemPage>0) itemPage--;
  else if(b.dataset.ip==='next' && itemPage<nPages()-1) itemPage++;
  render();
});

async function load(){
  try{
    const sb=initSupabase();
    if(sb){
      const [t,v,se]=await Promise.all([
        sb.from('upbo_types').select('*').order('sort_order'),
        sb.from('upbo_viewers').select('*').order('sort_order'),
        sb.from('upbo_seasons').select('*').order('sort_order')
      ]);
      if(!t.error && !v.error){ DATA={types:t.data||[], viewers:v.data||[], seasons:(se&&!se.error?se.data:[])||[]}; }
      const def=DATA.seasons.find(s=>s.is_active)||DATA.seasons[0]||null;
      curSeason=def?def.id:null;
      renderSeasonTabs();
    }
  }catch(e){ /* 빈 상태 안내 */ }
  render();
}
render();
load();
</script>
</body>
</html>
