<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>히라 · 어드민</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Gothic+A1:wght@400;500;600;700;800;900&family=Jua&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/css/common.css" />
<style>
  .adminbar{position:fixed;top:0;left:0;right:0;z-index:50;height:62px;display:flex;align-items:center;
    gap:10px;padding:0 20px;background:rgba(255,247,238,.95);border-bottom:2px solid var(--pink);}
  .adminbar .t{font-family:'Jua',sans-serif;color:var(--red);font-size:1.35rem;margin-right:auto;}
  .btn{font-family:'Jua',sans-serif;font-size:1.02rem;color:#fff;background:var(--red);
    border:3px solid #fff;border-radius:13px;padding:8px 16px;cursor:pointer;box-shadow:0 3px 0 var(--red-d);}
  .btn.ghost{background:#fff;color:var(--red-d);box-shadow:0 3px 0 rgba(208,109,34,.25);}
  .btn.hot{background:var(--hot);box-shadow:0 3px 0 #d63b7d;}
  .btn:active{transform:translateY(1px);}

  /* 로그인 */
  #login{max-width:360px;margin:60px auto;}
  #login .panel{text-align:center;}
  #login input{width:100%;padding:12px 14px;border:2px solid var(--pink);border-radius:11px;
    background:var(--cream);font-family:'Gothic A1';font-size:1.05rem;margin-bottom:10px;}
  #login input:focus{outline:none;border-color:var(--red);}
  #login .err{color:#d63b7d;font-size:.95rem;min-height:20px;margin-top:4px;}

  #panel{display:none;}

  /* 탭 */
  .tabs{display:flex;gap:9px;margin-bottom:22px;}
  .tab{font-family:'Jua',sans-serif;font-size:1.18rem;color:var(--red-d);background:#fff;
    border:3px solid var(--pink);border-radius:16px;padding:10px 26px;cursor:pointer;
    box-shadow:0 3px 0 rgba(208,109,34,.2);transition:transform .1s ease;}
  .tab.on{background:var(--red);color:#fff;border-color:#fff;box-shadow:0 3px 0 var(--red-d);}
  .tab:active{transform:translateY(1px);}
  .pane[hidden]{display:none;}
  .sec-title{font-family:'Jua',sans-serif;color:var(--red-d);font-size:1.3rem;margin:4px 0 16px;}

  /* 폼 (프로필/안내) */
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .fld{display:flex;flex-direction:column;gap:5px;}
  .fld.full{grid-column:1/-1;}
  .fld label{font-family:'Jua',sans-serif;font-size:.98rem;color:var(--red-d);}
  .fld label .s{font-size:.74rem;background:var(--pink-l);border:1.5px solid var(--pink);border-radius:8px;padding:1px 6px;margin-left:5px;}
  .fld input,.fld textarea{font-family:'Gothic A1';font-size:1.02rem;color:var(--ink);
    border:2px solid var(--pink);border-radius:10px;padding:10px 12px;background:var(--cream);width:100%;line-height:1.6;}
  .fld input:focus,.fld textarea:focus{outline:none;border-color:var(--red);}
  .fld textarea{resize:vertical;min-height:60px;}
  .save-row{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;}

  /* 업보 그리드 — 크게 */
  .bar{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:18px;}
  .scroll{overflow-x:auto;border-radius:12px;}
  table{border-collapse:collapse;width:100%;font-size:1.05rem;}
  th,td{padding:13px 16px;border-bottom:1px solid var(--pink-l);white-space:nowrap;}
  thead th{font-family:'Jua',sans-serif;font-weight:400;color:var(--red-d);
    border-bottom:2px solid var(--pink);font-size:1.08rem;}
  .vn,th.vn{text-align:left;font-weight:700;color:#5b463a;font-size:1.08rem;}
  tfoot td{border-top:2px solid var(--pink);border-bottom:none;font-weight:700;color:var(--red-d);background:#fffdf9;font-size:1.08rem;}
  .th-type{display:flex;align-items:center;gap:7px;justify-content:center;}
  .th-type .nm{font-family:'Jua',sans-serif;font-size:1.08rem;}
  .sw{width:15px;height:15px;border-radius:4px;flex:0 0 auto;}
  .mini{border:none;background:transparent;cursor:pointer;font-size:1.05rem;opacity:.55;padding:0 2px;}
  .mini:hover{opacity:1;}
  .cc{display:inline-flex;align-items:center;gap:8px;}
  .cc button{width:30px;height:30px;border-radius:9px;border:2px solid var(--pink);background:var(--pink-l);
    color:var(--red-d);font-weight:900;cursor:pointer;line-height:1;font-size:1.2rem;}
  .cc button:hover{background:var(--pink);}
  .cc .n{min-width:28px;text-align:center;font-weight:700;font-size:1.1rem;}
  .cc .n.zero{color:#cdbcae;font-weight:400;}
  .rowsum{text-align:center;color:var(--red);font-weight:700;font-size:1.08rem;}

  /* 일정 관리 */
  .sch-cols{display:grid;grid-template-columns:1fr 1fr;gap:22px;align-items:start;}
  .sform{display:flex;flex-direction:column;gap:11px;}
  .sform .row2{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
  .sform .fld{display:flex;flex-direction:column;gap:5px;}
  .sform label{font-family:'Jua',sans-serif;font-size:.95rem;color:var(--red-d);}
  .sform input,.sform select{font-family:'Gothic A1';font-size:1rem;color:var(--ink);
    border:2px solid var(--pink);border-radius:10px;padding:9px 11px;background:var(--cream);width:100%;}
  .sform input:focus,.sform select:focus{outline:none;border-color:var(--red);}
  .sform input[type=color]{height:42px;padding:3px;cursor:pointer;}
  .anniv-toggle{display:flex;align-items:center;gap:8px;font-size:.95rem;color:#5b463a;cursor:pointer;}
  .adm-cal-head{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:10px;}
  .adm-cal-nav{font-family:'Jua',sans-serif;font-size:1.1rem;cursor:pointer;color:#fff;background:var(--red);
    border:2px solid #fff;border-radius:9px;width:34px;height:34px;box-shadow:0 2px 0 var(--red-d);line-height:1;}
  .adm-cal-label{font-family:'Jua',sans-serif;font-size:1.2rem;color:var(--red-d);min-width:120px;text-align:center;}
  .adm-cal-wd{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;text-align:center;font-family:'Jua',sans-serif;font-size:.82rem;color:#b08b6e;margin-bottom:4px;}
  .adm-cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
  .adm-cal-cell{min-height:54px;border:1.5px solid var(--pink-l);border-radius:9px;padding:3px;background:var(--cream);
    cursor:pointer;display:flex;flex-direction:column;gap:2px;overflow:hidden;}
  .adm-cal-cell.empty{border:none;background:transparent;cursor:default;}
  .adm-cal-cell.today{background:var(--pink-l);border-color:var(--red);}
  .adm-cal-daynum{font-family:'Jua',sans-serif;font-size:.85rem;color:#5b463a;line-height:1;}
  .adm-cal-ev{font-size:.62rem;border-radius:5px;padding:1px 4px;overflow:hidden;text-overflow:ellipsis;
    white-space:nowrap;color:#4a3a30;font-weight:700;line-height:1.3;cursor:pointer;}
  .adm-cal-cell.anniv{overflow:visible;z-index:2;}
  .adm-cal-ev.anniv{animation:adm-anniv-glow 1.6s ease-in-out infinite;position:relative;}
  @keyframes adm-anniv-glow{0%,100%{box-shadow:0 0 0 0 rgba(var(--glow-rgb,255,92,158),0);transform:scale(1)}50%{box-shadow:0 0 8px 3px rgba(var(--glow-rgb,255,92,158),.85);transform:scale(1.05)}}
  .adm-cal-more{font-size:.58rem;color:#b08b6e;font-weight:700;}
  #schTable{border-collapse:collapse;width:100%;font-size:1rem;}
  #schTable th,#schTable td{padding:10px 12px;border-bottom:1px solid var(--pink-l);text-align:left;white-space:nowrap;}
  #schTable thead th{font-family:'Jua',sans-serif;color:var(--red-d);border-bottom:2px solid var(--pink);}
  .sch-type-badge{display:inline-block;font-size:.82rem;border-radius:8px;padding:1px 10px;font-weight:700;color:#4a3a30;}
  .sch-act{border:none;background:transparent;cursor:pointer;font-size:1rem;opacity:.6;padding:0 3px;}
  .sch-act:hover{opacity:1;}
  .sch-hidden td{opacity:.45;}
</style>
</head>
<body>

<div class="adminbar">
  <span class="t">🛠️ 히라 어드민</span>
  <a class="btn ghost" href="/">사이트 보기</a>
  <button class="btn hot" id="logoutBtn" style="display:none">로그아웃</button>
</div>

<!-- 로그인 -->
<div id="login" class="page">
  <section class="panel">
    <div class="sec-title">로그인</div>
    <input id="email" type="email" placeholder="이메일" autocomplete="username" />
    <input id="pw" type="password" placeholder="비밀번호" autocomplete="current-password" />
    <button class="btn" id="loginBtn" style="width:100%">로그인</button>
    <div class="err" id="loginErr"></div>
  </section>
</div>

<!-- 패널 -->
<div id="panel" class="page">
  <div class="tabs">
    <button class="tab on" data-tab="upbo">업보</button>
    <button class="tab" data-tab="schedule">일정</button>
    <button class="tab" data-tab="guide">안내</button>
    <button class="tab" data-tab="profile">프로필</button>
  </div>

  <!-- 업보 -->
  <div class="pane" id="tab-upbo">
    <section class="panel">
      <div class="sec-title">🏆 업보 편집</div>
      <div class="bar">
        <button class="btn" id="addTypeBtn">+ 업보 종류</button>
        <button class="btn" id="addViewerBtn">+ 시청자</button>
      </div>
      <div class="scroll"><table id="upboGrid"></table></div>
      <p class="note">✎ 이름변경 · 🗑 삭제 · 셀 +/− 즉시 저장</p>
    </section>
  </div>

  <!-- 일정 -->
  <div class="pane" id="tab-schedule" hidden>
    <div class="sch-cols">
      <section class="panel">
        <div class="sec-title">📅 일정 추가</div>
        <div class="sform">
          <div class="row2">
            <div class="fld"><label>날짜</label><input type="date" id="schDate"></div>
            <div class="fld"><label>시간</label><input type="time" id="schTime"></div>
          </div>
          <div class="fld"><label>제목</label><input type="text" id="schTitle" placeholder="방송 제목"></div>
          <div class="fld"><label>메모</label><input type="text" id="schDesc" placeholder="설명 (선택)"></div>
          <div class="fld"><label>유형</label>
            <select id="schType" onchange="onSchTypeChange()">
              <option value="broadcast">방송</option>
              <option value="rest">휴방 (제목 자동 · 시간 없음)</option>
              <option value="event">이벤트</option>
              <option value="collab">합방</option>
              <option value="tournament">대회</option>
              <option value="other">기타</option>
            </select>
          </div>
          <label class="anniv-toggle"><input type="checkbox" id="schAnniv" onchange="onSchAnnivChange()"> <span>🎉 기념일 효과 (바운스 글로우)</span></label>
          <div id="schAnnivWrap" style="display:none"><div class="fld"><label>기념일 색</label><input type="color" id="schAnnivColor" value="#ff5c9e"></div></div>
          <button class="btn" onclick="handleAddSchedule()" style="margin-top:4px">+ 일정 추가</button>
        </div>
      </section>
      <section class="panel">
        <div class="sec-title">🗓️ 달력 <span style="font-family:'Gothic A1';font-size:.78rem;color:#b08b6e;font-weight:400">날짜=입력일 지정 · 일정=수정</span></div>
        <div class="adm-cal-head">
          <button class="adm-cal-nav" onclick="admCalNav(-1)">‹</button>
          <span class="adm-cal-label" id="admCalLabel">—</span>
          <button class="adm-cal-nav" onclick="admCalNav(1)">›</button>
        </div>
        <div class="adm-cal-wd"><span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span></div>
        <div class="adm-cal-grid" id="admCalGrid"></div>
      </section>
    </div>
    <section class="panel">
      <div class="sec-title">📋 일정 목록</div>
      <div class="scroll"><table id="schTable"></table></div>
    </section>
  </div>

  <!-- 안내 -->
  <div class="pane" id="tab-guide" hidden>
    <section class="panel">
      <div class="sec-title">📋 방송 규칙</div>
      <textarea id="g_rules" rows="7" style="width:100%;font-family:'Gothic A1';font-size:1.02rem;line-height:1.7;border:2px solid var(--pink);border-radius:10px;padding:12px;background:var(--cream)"></textarea>
      <p class="note">한 줄에 규칙 하나씩</p>
      <div class="sec-title" style="margin-top:20px">📖 방송 용어</div>
      <textarea id="g_terms" rows="8" style="width:100%;font-family:'Gothic A1';font-size:1.02rem;line-height:1.7;border:2px solid var(--pink);border-radius:10px;padding:12px;background:var(--cream)"></textarea>
      <p class="note">한 줄에 「용어 ; 설명」 하나씩 (예: 종겜 ; 종합게임 방송)</p>
      <p class="note">※ 방송 시간 배너는 「프로필」 탭의 '방송 시간' 값을 사용합니다.</p>
      <div class="save-row"><button class="btn" id="saveGuideBtn">안내 저장</button></div>
    </section>
  </div>

  <!-- 프로필 -->
  <div class="pane" id="tab-profile" hidden>
    <section class="panel">
      <div class="sec-title">📇 프로필 편집</div>
      <div class="form-grid" id="profForm"></div>
      <div class="save-row"><button class="btn" id="saveProfBtn">프로필 저장</button></div>
    </section>
  </div>
</div>

<!-- 일정 수정 모달 -->
<div id="schEditModal" style="display:none;position:fixed;inset:0;background:rgba(70,52,42,.4);z-index:200;align-items:center;justify-content:center;padding:20px">
  <div class="panel" style="max-width:430px;width:100%;margin:0;max-height:88vh;overflow:auto">
    <div class="sec-title">일정 수정</div>
    <div class="sform">
      <div class="row2">
        <div class="fld"><label>날짜</label><input type="date" id="editSchDate"></div>
        <div class="fld"><label>시간</label><input type="time" id="editSchTime"></div>
      </div>
      <div class="fld"><label>제목</label><input type="text" id="editSchTitle"></div>
      <div class="fld"><label>메모</label><input type="text" id="editSchDesc"></div>
      <div class="fld"><label>유형</label>
        <select id="editSchType" onchange="onEditSchTypeChange()">
          <option value="broadcast">방송</option>
          <option value="rest">휴방 (제목 자동 · 시간 없음)</option>
          <option value="event">이벤트</option>
          <option value="collab">합방</option>
          <option value="tournament">대회</option>
          <option value="other">기타</option>
        </select>
      </div>
      <label class="anniv-toggle"><input type="checkbox" id="editSchAnniv" onchange="onEditSchAnnivChange()"> <span>🎉 기념일 효과</span></label>
      <div id="editSchAnnivWrap" style="display:none"><div class="fld"><label>기념일 색</label><input type="color" id="editSchAnnivColor" value="#ff5c9e"></div></div>
      <div class="save-row">
        <button class="btn ghost" onclick="closeSchEdit()">취소</button>
        <button class="btn" onclick="handleEditSchedule()">저장</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/supabase-config.js"></script>
<script>
const PALETTE=['#ffb3d1','#c5b8e8','#a8d8d4','#aed4f7','#ffd9a0','#ffc4a0','#d6c2f0','#ffd1dc'];
const PFIELDS=[
  {k:'name',label:'이름'},{k:'reading',label:'읽는 법'},
  {k:'bio',label:'한 줄 소개',full:true},
  {k:'birthday',label:'생일'},{k:'debut',label:'데뷔일'},
  {k:'mbti',label:'MBTI'},{k:'gender',label:'성별'},
  {k:'personality',label:'성격'},{k:'agency',label:'소속',settable:true},
  {k:'fandom',label:'팬덤'},{k:'schedule',label:'방송 시간'},
  {k:'content',label:'콘텐츠'},{k:'games',label:'게임'},
  {k:'music',label:'음악 장르',full:true},
  {k:'likes',label:'좋아하는 것',area:true,full:true,settable:true},
  {k:'dislikes',label:'싫어하는 것',area:true,full:true,settable:true},
  {k:'channel',label:'방송국 URL',full:true},
  {k:'youtube',label:'유튜브 URL',full:true},
  {k:'cafe',label:'카페 URL',full:true},
  {k:'songclip',label:'노래 클립 URL',full:true},
];
const DEF_RULES=[
  '서로 존중해요. 비방 · 욕설 · 인신공격 금지.',
  '정치 · 종교 · 민감한 주제는 자제해주세요.',
  '도배 · 광고 · 스포일러 금지.',
  '다른 스트리머 언급 · 비교는 삼가주세요.',
  '방장 안내에 따라주시면 더 즐거운 방송이 돼요!'
];
const DEF_TERMS=[
  {t:'종겜', d:'종합게임 — 여러 게임을 돌아가며 하는 방송.'},
  {t:'휴방', d:'쉬는 날. 방송이 없는 요일.'},
  {t:'별풍 / 도네', d:'후원. 별풍선 등으로 보내는 응원.'},
  {t:'다시보기', d:'지난 방송 VOD. 놓친 방송을 다시 시청.'},
  {t:'클립', d:'방송 중 짧게 잘라 공유하는 영상.'}
];
let sb=null, U={types:[],viewers:[]};
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

// ---------------- 탭 ----------------
document.querySelector('.tabs').addEventListener('click',e=>{
  const b=e.target.closest('.tab'); if(!b) return;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on', t===b));
  document.querySelectorAll('.pane').forEach(p=>{ p.hidden = (p.id!=='tab-'+b.dataset.tab); });
});

// ---------------- 세션 ----------------
async function refresh(){
  sb=initSupabase();
  if(!sb){ document.getElementById('loginErr').textContent='Supabase 로드 실패'; return; }
  const { data:{ session } } = await sb.auth.getSession();
  if(session){ showPanel(true); await loadProfile(); await loadGuide(); await loadUpbo(); await loadScheduleAdmin(); }
  else { showPanel(false); }
}
function showPanel(on){
  document.getElementById('panel').style.display = on?'block':'none';
  document.getElementById('login').style.display = on?'none':'block';
  document.getElementById('logoutBtn').style.display = on?'inline-block':'none';
}
document.getElementById('loginBtn').addEventListener('click', async ()=>{
  const email=document.getElementById('email').value.trim();
  const pw=document.getElementById('pw').value;
  document.getElementById('loginErr').textContent='';
  const { error } = await sb.auth.signInWithPassword({ email, password: pw });
  if(error){ document.getElementById('loginErr').textContent='로그인 실패: '+error.message; return; }
  await refresh();
});
document.getElementById('logoutBtn').addEventListener('click', async ()=>{ await sb.auth.signOut(); showPanel(false); });

// ---------------- 프로필 ----------------
async function loadProfile(){
  let P={}; PFIELDS.forEach(f=>P[f.k]='');
  const { data, error } = await sb.from('site_settings').select('key,value');
  if(!error && data){ data.forEach(r=>{ if(r.value!=null) P[r.key]=r.value; }); }
  let h='';
  PFIELDS.forEach(f=>{
    const id='pf_'+f.k, s=f.settable?'<span class="s">설정가능</span>':'';
    const ctrl=f.area?`<textarea id="${id}">${esc(P[f.k])}</textarea>`:`<input id="${id}" type="text" value="${esc(P[f.k])}" />`;
    h+=`<div class="fld ${f.full?'full':''}"><label>${f.label}${s}</label>${ctrl}</div>`;
  });
  document.getElementById('profForm').innerHTML=h;
}
document.getElementById('saveProfBtn').addEventListener('click', async ()=>{
  const rows=PFIELDS.map(f=>({ key:f.k, value:document.getElementById('pf_'+f.k).value }));
  const { error } = await sb.from('site_settings').upsert(rows, { onConflict:'key' });
  alert(error ? ('저장 실패: '+error.message) : '프로필 저장됨 ✓');
});

// ---------------- 안내 ----------------
async function loadGuide(){
  let rules=DEF_RULES, terms=DEF_TERMS;
  const { data } = await sb.from('site_settings').select('key,value').in('key',['guide_rules','guide_terms']);
  const m={}; (data||[]).forEach(r=>m[r.key]=r.value);
  if(m.guide_rules){ try{ const a=JSON.parse(m.guide_rules); if(Array.isArray(a)) rules=a; }catch(e){} }
  if(m.guide_terms){ try{ const a=JSON.parse(m.guide_terms); if(Array.isArray(a)) terms=a; }catch(e){} }
  document.getElementById('g_rules').value = rules.join('\n');
  document.getElementById('g_terms').value = terms.map(x=>`${x.t} ; ${x.d}`).join('\n');
}
document.getElementById('saveGuideBtn').addEventListener('click', async ()=>{
  const rules=document.getElementById('g_rules').value.split('\n').map(s=>s.trim()).filter(Boolean);
  const terms=document.getElementById('g_terms').value.split('\n').map(line=>{
    const i=line.indexOf(';'); if(i<0) return { t:line.trim(), d:'' };
    return { t:line.slice(0,i).trim(), d:line.slice(i+1).trim() };
  }).filter(x=>x.t);
  const rows=[ {key:'guide_rules', value:JSON.stringify(rules)}, {key:'guide_terms', value:JSON.stringify(terms)} ];
  const { error } = await sb.from('site_settings').upsert(rows, { onConflict:'key' });
  alert(error ? ('저장 실패: '+error.message) : '안내 저장됨 ✓');
});

// ---------------- 업보 ----------------
function getCount(v,tid){ const n=v.counts?v.counts[String(tid)]:0; return n?Number(n):0; }
function rowTotal(v){ return U.types.reduce((s,t)=>s+getCount(v,t.id),0); }
function colTotal(t){ return U.viewers.reduce((s,v)=>s+getCount(v,t.id),0); }
function grand(){ return U.viewers.reduce((s,v)=>s+rowTotal(v),0); }

async function loadUpbo(){
  const [t,v]=await Promise.all([
    sb.from('upbo_types').select('*').order('sort_order'),
    sb.from('upbo_viewers').select('*').order('sort_order')
  ]);
  U={ types:t.data||[], viewers:v.data||[] };
  renderUpbo();
}
function renderUpbo(){
  const T=U.types, V=U.viewers;
  let h='<thead><tr><th class="vn">시청자</th>';
  T.forEach(t=>{
    h+=`<th><div class="th-type"><span class="sw" style="background:${t.color||'#ffb3d1'}"></span><span class="nm">${esc(t.name)}</span>`
      +`<button class="mini" data-act="rentype" data-id="${t.id}">✎</button>`
      +`<button class="mini" data-act="deltype" data-id="${t.id}">🗑</button></div></th>`;
  });
  h+='<th>합계</th></tr></thead><tbody>';
  V.forEach(v=>{
    h+=`<tr><td class="vn">${esc(v.name)} `
      +`<button class="mini" data-act="renviewer" data-id="${v.id}">✎</button>`
      +`<button class="mini" data-act="delviewer" data-id="${v.id}">🗑</button></td>`;
    T.forEach(t=>{ const n=getCount(v,t.id);
      h+=`<td style="text-align:center"><span class="cc">`
        +`<button data-act="dec" data-v="${v.id}" data-t="${t.id}">−</button>`
        +`<span class="n${n?'':' zero'}">${n}</span>`
        +`<button data-act="inc" data-v="${v.id}" data-t="${t.id}">+</button></span></td>`;
    });
    h+=`<td class="rowsum">${rowTotal(v)}</td></tr>`;
  });
  h+='</tbody><tfoot><tr><td class="vn">종류 합계</td>';
  T.forEach(t=>{ h+=`<td style="text-align:center">${colTotal(t)}</td>`; });
  h+=`<td style="text-align:center">${grand()}</td></tr></tfoot>`;
  document.getElementById('upboGrid').innerHTML=h;
}
document.getElementById('upboGrid').addEventListener('click', async e=>{
  const b=e.target.closest('[data-act]'); if(!b) return;
  const act=b.dataset.act;
  try{
    if(act==='inc'||act==='dec'){
      const v=U.viewers.find(x=>String(x.id)===String(b.dataset.v)); if(!v) return;
      const c=Object.assign({},v.counts||{}); const tid=String(b.dataset.t);
      let n=(c[tid]?Number(c[tid]):0)+(act==='inc'?1:-1); if(n<0)n=0;
      if(n===0) delete c[tid]; else c[tid]=n;
      const { error } = await sb.from('upbo_viewers').update({ counts:c }).eq('id', v.id);
      if(error) return alert(error.message);
      v.counts=c; renderUpbo();
    } else if(act==='rentype'){
      const t=U.types.find(x=>String(x.id)===String(b.dataset.id));
      const nv=prompt('업보 종류 이름', t.name); if(!nv||!nv.trim()) return;
      const { error } = await sb.from('upbo_types').update({ name:nv.trim() }).eq('id', t.id);
      if(error) return alert(error.message); loadUpbo();
    } else if(act==='deltype'){
      if(!confirm('이 업보 종류를 삭제할까요?')) return;
      const { error } = await sb.from('upbo_types').delete().eq('id', b.dataset.id);
      if(error) return alert(error.message); loadUpbo();
    } else if(act==='renviewer'){
      const v=U.viewers.find(x=>String(x.id)===String(b.dataset.id));
      const nv=prompt('시청자 닉네임', v.name); if(!nv||!nv.trim()) return;
      const { error } = await sb.from('upbo_viewers').update({ name:nv.trim() }).eq('id', v.id);
      if(error) return alert(error.message); loadUpbo();
    } else if(act==='delviewer'){
      if(!confirm('이 시청자를 삭제할까요?')) return;
      const { error } = await sb.from('upbo_viewers').delete().eq('id', b.dataset.id);
      if(error) return alert(error.message); loadUpbo();
    }
  }catch(err){ alert('오류: '+err.message); }
});
document.getElementById('addTypeBtn').addEventListener('click', async ()=>{
  const n=prompt('새 업보 종류 이름 (예: 단컷방셀)'); if(!n||!n.trim()) return;
  const { error } = await sb.from('upbo_types').insert({ name:n.trim(), color:PALETTE[U.types.length%PALETTE.length], sort_order:U.types.length });
  if(error) return alert(error.message); loadUpbo();
});
document.getElementById('addViewerBtn').addEventListener('click', async ()=>{
  const n=prompt('시청자 닉네임'); if(!n||!n.trim()) return;
  const { error } = await sb.from('upbo_viewers').insert({ name:n.trim(), counts:{}, sort_order:U.viewers.length });
  if(error) return alert(error.message); loadUpbo();
});

refresh();

// ---------------- 일정 관리 (두미 로직 포팅) ----------------
const SCH_TYPE_COLORS = { broadcast:'#ffb3d1', rest:'#d0d0d0', event:'#c5b8e8', collab:'#a8d8d4', tournament:'#aed4f7', other:'#ffd9a0' };
const SCH_TYPE_LABELS = { broadcast:'방송', rest:'휴방', event:'이벤트', collab:'합방', tournament:'대회', other:'기타' };
let allSchedule=[], schEvMap={}, admCalY=null, admCalM=null, editSchId=null;
function schPad(n){ return String(n).padStart(2,'0'); }
function kstTodayStr(){ const now=new Date(); const utc=now.getTime()+now.getTimezoneOffset()*60000; const k=new Date(utc+9*3600000); return `${k.getFullYear()}-${schPad(k.getMonth()+1)}-${schPad(k.getDate())}`; }
function annivHexToRgb(hex){ hex=String(hex||'').replace('#',''); if(hex.length===3) hex=hex.split('').map(c=>c+c).join(''); const n=parseInt(hex,16); if(isNaN(n)||hex.length<6) return '255,92,158'; return `${(n>>16)&255},${(n>>8)&255},${n&255}`; }
function setScheduleDefaults(){ document.getElementById('schType').value='broadcast'; const ti=document.getElementById('schTime'); ti.value='18:00'; ti.disabled=false; const tt=document.getElementById('schTitle'); tt.disabled=false; tt.value=''; document.getElementById('schDesc').value=''; document.getElementById('schDate').value=kstTodayStr(); document.getElementById('schAnniv').checked=false; document.getElementById('schAnnivWrap').style.display='none'; }
// 휴방 → 제목 자동 '휴방' + 시간 없음(비활성)
function onSchTypeChange(){ const rest=document.getElementById('schType').value==='rest'; const ti=document.getElementById('schTime'), tt=document.getElementById('schTitle'); if(rest){ tt.value='휴방'; tt.disabled=true; ti.value=''; ti.disabled=true; } else { tt.disabled=false; ti.disabled=false; if(tt.value==='휴방') tt.value=''; } }
function onSchAnnivChange(){ document.getElementById('schAnnivWrap').style.display=document.getElementById('schAnniv').checked?'block':'none'; }
function onEditSchTypeChange(){ const rest=document.getElementById('editSchType').value==='rest'; const ti=document.getElementById('editSchTime'), tt=document.getElementById('editSchTitle'); if(rest){ tt.value='휴방'; tt.disabled=true; ti.value=''; ti.disabled=true; } else { tt.disabled=false; ti.disabled=false; } }
function onEditSchAnnivChange(){ document.getElementById('editSchAnnivWrap').style.display=document.getElementById('editSchAnniv').checked?'block':'none'; }

async function loadScheduleAdmin(){
  if(!document.getElementById('schDate').value) setScheduleDefaults();
  const { data, error } = await sb.from('schedule_events').select('*').order('date',{ascending:false}).order('time',{ascending:true});
  if(error){ alert('일정 로드 실패: '+error.message); return; }
  allSchedule = data||[]; schEvMap={};
  allSchedule.forEach(ev=>{ (schEvMap[ev.date]=schEvMap[ev.date]||[]).push(ev); });
  if(admCalY===null){ const now=new Date(); admCalY=now.getFullYear(); admCalM=now.getMonth(); }
  renderSchTable(); renderAdmCal();
}
function renderSchTable(){
  const tb=document.getElementById('schTable');
  if(!allSchedule.length){ tb.innerHTML='<tbody><tr><td style="text-align:center;padding:24px;color:#b08b6e">등록된 일정이 없어요</td></tr></tbody>'; return; }
  let h='<thead><tr><th>날짜</th><th>유형</th><th>제목 · 시간</th><th>관리</th></tr></thead><tbody>';
  allSchedule.forEach(ev=>{
    const c=SCH_TYPE_COLORS[ev.event_type]||ev.color||'#ffb3d1';
    const badge=`<span class="sch-type-badge" style="background:${c}">${SCH_TYPE_LABELS[ev.event_type]||ev.event_type||'방송'}</span>`;
    const tm=ev.time?` · ${esc(ev.time.slice(0,5))}`:'';
    const star=ev.is_anniversary?'🎉 ':'';
    h+=`<tr class="${ev.is_hidden?'sch-hidden':''}"><td>${esc(ev.date)}</td><td>${badge}</td><td>${star}${esc(ev.title)}${tm}</td>`
      +`<td><button class="sch-act" onclick="openSchEdit(${ev.id})" title="수정">✎</button>`
      +`<button class="sch-act" onclick="toggleSchHidden(${ev.id},${!ev.is_hidden})" title="${ev.is_hidden?'숨김 해제':'숨기기'}">${ev.is_hidden?'🙈':'👁'}</button>`
      +`<button class="sch-act" onclick="delSch(${ev.id})" title="삭제">🗑</button></td></tr>`;
  });
  tb.innerHTML=h+'</tbody>';
}
function renderAdmCal(){
  const first=new Date(admCalY,admCalM,1); const startDow=first.getDay();
  const dim=new Date(admCalY,admCalM+1,0).getDate(); const todayStr=kstTodayStr();
  document.getElementById('admCalLabel').textContent=`${admCalY}.${schPad(admCalM+1)}`;
  let h='';
  for(let i=0;i<startDow;i++) h+='<div class="adm-cal-cell empty"></div>';
  for(let d=1;d<=dim;d++){
    const ds=`${admCalY}-${schPad(admCalM+1)}-${schPad(d)}`;
    const evs=schEvMap[ds]||[]; const annivEv=evs.find(e=>e.is_anniversary);
    const shown=evs.slice(0,2).map(ev=>{ const c=SCH_TYPE_COLORS[ev.event_type]||ev.color||'#ffb3d1'; const star=ev.is_anniversary?'🎉':''; return `<div class="adm-cal-ev${ev.is_anniversary?' anniv':''}" style="background:${c}" title="${esc(ev.title)}" onclick="event.stopPropagation();openSchEdit(${ev.id})">${star}${esc(ev.title)}</div>`; }).join('');
    const more=evs.length>2?`<div class="adm-cal-more">+${evs.length-2}</div>`:'';
    const annivStyle=annivEv?` style="--glow-rgb:${annivHexToRgb(annivEv.anniv_color)}"`:'';
    h+=`<div class="adm-cal-cell${ds===todayStr?' today':''}${annivEv?' anniv':''}" onclick="admPickDay('${ds}')"${annivStyle}><div class="adm-cal-daynum">${d}</div>${shown}${more}</div>`;
  }
  document.getElementById('admCalGrid').innerHTML=h;
}
function admCalNav(delta){ admCalM+=delta; if(admCalM<0){admCalM=11;admCalY--;} else if(admCalM>11){admCalM=0;admCalY++;} renderAdmCal(); }
function admPickDay(ds){ document.getElementById('schType').value='broadcast'; onSchTypeChange(); document.getElementById('schDate').value=ds; document.getElementById('schTitle').focus(); }

async function handleAddSchedule(){
  const type=document.getElementById('schType').value, rest=type==='rest';
  const date=document.getElementById('schDate').value;
  let time=document.getElementById('schTime').value;
  let title=document.getElementById('schTitle').value.trim();
  const desc=document.getElementById('schDesc').value.trim();
  if(rest){ title='휴방'; time=''; }
  if(!date){ alert('날짜를 입력하세요'); return; }
  if(!title){ alert('제목을 입력하세요'); return; }
  const isAnniv=document.getElementById('schAnniv').checked;
  const annivColor=isAnniv?document.getElementById('schAnnivColor').value:null;
  const { error } = await sb.from('schedule_events').insert({ date, time:time||null, title, description:desc||null, event_type:type, color:SCH_TYPE_COLORS[type]||null, is_anniversary:isAnniv, anniv_color:annivColor });
  if(error){ alert('추가 실패: '+error.message); return; }
  setScheduleDefaults(); loadScheduleAdmin();
}
function openSchEdit(id){
  const ev=allSchedule.find(e=>e.id===id); if(!ev) return;
  editSchId=id;
  document.getElementById('editSchDate').value=ev.date;
  document.getElementById('editSchTime').value=ev.time?ev.time.slice(0,5):'';
  document.getElementById('editSchTitle').value=ev.title;
  document.getElementById('editSchDesc').value=ev.description||'';
  document.getElementById('editSchType').value=ev.event_type||'broadcast';
  document.getElementById('editSchAnniv').checked=!!ev.is_anniversary;
  if(ev.anniv_color) document.getElementById('editSchAnnivColor').value=ev.anniv_color;
  document.getElementById('editSchAnnivWrap').style.display=ev.is_anniversary?'block':'none';
  onEditSchTypeChange();
  document.getElementById('schEditModal').style.display='flex';
}
function closeSchEdit(){ document.getElementById('schEditModal').style.display='none'; }
async function handleEditSchedule(){
  const type=document.getElementById('editSchType').value, rest=type==='rest';
  const date=document.getElementById('editSchDate').value;
  let time=document.getElementById('editSchTime').value;
  let title=document.getElementById('editSchTitle').value.trim();
  const desc=document.getElementById('editSchDesc').value.trim();
  if(rest){ title='휴방'; time=''; }
  if(!date||!title){ alert('날짜·제목을 입력하세요'); return; }
  const isAnniv=document.getElementById('editSchAnniv').checked;
  const annivColor=isAnniv?document.getElementById('editSchAnnivColor').value:null;
  const { error } = await sb.from('schedule_events').update({ date, time:time||null, title, description:desc||null, event_type:type, color:SCH_TYPE_COLORS[type]||null, is_anniversary:isAnniv, anniv_color:annivColor }).eq('id', editSchId);
  if(error){ alert('수정 실패: '+error.message); return; }
  closeSchEdit(); loadScheduleAdmin();
}
async function toggleSchHidden(id,hidden){
  const { error } = await sb.from('schedule_events').update({ is_hidden:hidden }).eq('id', id);
  if(error){ alert(error.message); return; } loadScheduleAdmin();
}
async function delSch(id){
  const ev=allSchedule.find(e=>e.id===id);
  if(!confirm(`"${ev?ev.title:''}" 일정을 삭제할까요?`)) return;
  const { error } = await sb.from('schedule_events').delete().eq('id', id);
  if(error){ alert(error.message); return; } loadScheduleAdmin();
}
document.getElementById('schEditModal').addEventListener('click', e=>{ if(e.target.id==='schEditModal') closeSchEdit(); });
</script>
