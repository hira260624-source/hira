<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>히라 · 방송안내</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Gothic+A1:wght@400;500;700;800&family=Jua&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/css/common.css" />
<style>
  .when{display:flex;gap:14px;align-items:center;flex-wrap:wrap;background:var(--pink-l);
    border:2.5px solid var(--pink);border-radius:16px;padding:18px 22px;margin-bottom:22px;}
  .when .big{font-family:'Jua',sans-serif;color:var(--red-d);font-size:1.55rem;}
  .rules{list-style:none;counter-reset:r;display:grid;gap:14px;}
  .rules li{counter-increment:r;display:flex;gap:14px;align-items:flex-start;font-size:1.12rem;line-height:1.65;color:#4a3a30;}
  .rules li::before{content:counter(r);flex:0 0 auto;width:30px;height:30px;border-radius:10px;
    background:var(--red);color:#fff;font-family:'Jua',sans-serif;font-size:1rem;
    display:flex;align-items:center;justify-content:center;margin-top:1px;}
  .glossary{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px;}
  .term{background:var(--cream);border:2px solid var(--pink);border-radius:14px;padding:15px 17px;}
  .term dt{font-family:'Jua',sans-serif;color:var(--red-d);font-size:1.25rem;margin-bottom:6px;}
  .term dd{font-size:1.02rem;color:#5b463a;line-height:1.6;}
</style>
</head>
<body>

<nav class="topnav">
  <a class="home" href="/">히라 ♡</a>
  <a class="lk" href="/profile/">프로필</a>
  <a class="lk" href="/schedule/">일정</a>
  <a class="lk" href="https://meloming.com/channel/hira" target="_blank" rel="noopener">노래책</a>
  <a class="lk" href="/upbo/">업보</a>
  <a class="lk on" href="/guide/">방송안내</a>
</nav>

<div class="page">
  <div class="phead"><span class="kr">방송안내</span><span class="en">GUIDE</span></div>

  <div class="when"><span class="big">🕗 <span id="whenText">저녁 8시 고정 (수 · 토 휴방)</span></span></div>

  <section class="panel">
    <h2>📋 방송 규칙</h2>
    <ol class="rules" id="rules"></ol>
  </section>

  <section class="panel">
    <h2>📖 방송 용어</h2>
    <dl class="glossary" id="terms"></dl>
  </section>
</div>

<footer class="foot">
  <div class="h">© 2026 히라 · 꾸이단 💗</div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/supabase-config.js"></script>
<script>
const DEFAULT_RULES=[
  '서로 존중해요. 비방 · 욕설 · 인신공격 금지.',
  '정치 · 종교 · 민감한 주제는 자제해주세요.',
  '도배 · 광고 · 스포일러 금지.',
  '다른 스트리머 언급 · 비교는 삼가주세요.',
  '방장 안내에 따라주시면 더 즐거운 방송이 돼요!'
];
const DEFAULT_TERMS=[
  {t:'종겜', d:'종합게임 — 여러 게임을 돌아가며 하는 방송.'},
  {t:'휴방', d:'쉬는 날. 방송이 없는 요일.'},
  {t:'별풍 / 도네', d:'후원. 별풍선 등으로 보내는 응원.'},
  {t:'다시보기', d:'지난 방송 VOD. 놓친 방송을 다시 시청.'},
  {t:'클립', d:'방송 중 짧게 잘라 공유하는 영상.'}
];
const DEFAULT_WHEN='저녁 8시 고정 (수 · 토 휴방)';
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function render(rules,terms,when){
  document.getElementById('whenText').textContent=when;
  document.getElementById('rules').innerHTML=rules.map(r=>`<li>${esc(r)}</li>`).join('');
  document.getElementById('terms').innerHTML=terms.map(x=>`<div class="term"><dt>${esc(x.t)}</dt><dd>${esc(x.d)}</dd></div>`).join('');
}
async function load(){
  let rules=DEFAULT_RULES, terms=DEFAULT_TERMS, when=DEFAULT_WHEN;
  try{
    const sb=initSupabase();
    if(sb){
      const { data } = await sb.from('site_settings').select('key,value').in('key',['guide_rules','guide_terms','schedule']);
      const m={}; (data||[]).forEach(r=>m[r.key]=r.value);
      if(m.guide_rules){ try{ const a=JSON.parse(m.guide_rules); if(Array.isArray(a)&&a.length) rules=a; }catch(e){} }
      if(m.guide_terms){ try{ const a=JSON.parse(m.guide_terms); if(Array.isArray(a)&&a.length) terms=a; }catch(e){} }
      if(m.schedule && m.schedule.trim()) when=m.schedule;
    }
  }catch(e){ /* 폴백 */ }
  render(rules,terms,when);
}
render(DEFAULT_RULES,DEFAULT_TERMS,DEFAULT_WHEN);
load();
</script>
</body>
</html>
